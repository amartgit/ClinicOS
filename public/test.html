<script type="module">
import { signIn, getCurrentUser } from "./js/auth.js";

document.addEventListener("DOMContentLoaded", async () => {
    try {
        const user = await signIn("doctor1@example.com", "password123", "doctor");
        console.log("Logged in user:", user);

        const current = getCurrentUser();
        console.log("Current user from localStorage:", current);
    } catch (err) {
        console.error("Login failed:", err.message);
    }
});
</script>
